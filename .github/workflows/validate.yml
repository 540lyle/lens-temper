name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: LensTemper package checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Check script syntax
        run: |
          for file in reviews/scripts/*.mjs; do
            node --check "$file"
          done

      - name: Verify generated Codex plugin payload
        run: |
          node reviews/scripts/sync-codex-plugin-payload.mjs
          payload_status="$(git status --porcelain --untracked-files=all -- plugins/lens-temper)"
          if [ -n "$payload_status" ]; then
            printf '%s\n' "$payload_status"
            exit 1
          fi

      - name: Run independent validation lanes in parallel
        run: node reviews/scripts/validate-all.mjs
